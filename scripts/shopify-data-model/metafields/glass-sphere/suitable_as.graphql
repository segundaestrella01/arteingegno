# Glass sphere metafield: suitable_as
#
# Suggested use contexts for the sphere. Powers the "Suitable as" section
# on the PDP and gift-guide collection filters. Controlled vocabulary:
# Desk decoration, Shelf display, Display cabinet, Paperweight, Gift.
# Multiple values allowed.

mutation CreateGlassSphereSuitableAsDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

