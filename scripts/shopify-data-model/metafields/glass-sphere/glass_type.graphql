# Glass sphere metafield: glass_type
#
# The glass-making technique used for this sphere. Affects visual quality,
# clarity, and price positioning. Controlled vocabulary: Blown, Pressed.
# (Murano and Crystal are sub-categories of Blown for our catalog.)

mutation CreateGlassSphereGlassTypeDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

