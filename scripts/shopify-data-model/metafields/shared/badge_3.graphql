# Shared metafield: badge_3
#
# Third reassurance badge displayed below the Add to Cart button on the
# product detail page (e.g. "Filiera tracciabile").

mutation CreateBadge3Definition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

