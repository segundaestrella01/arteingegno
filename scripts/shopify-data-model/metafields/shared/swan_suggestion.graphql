# Shared metafield: swan_suggestion
#
# Seller's personal recommendation or story for the product, displayed as
# a full-width quote section ("Swan Suggerisce…") on the PDP.

mutation CreateSwanSuggestionDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

