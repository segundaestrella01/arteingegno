# Shared metafield: badge_1
#
# First reassurance badge displayed below the Add to Cart button on the
# product detail page. Short, specific trust signal (e.g. "Artigianalità sarda").

mutation CreateBadge1Definition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

