# Shared metafield: packaging
#
# Short description of the packaging included with the product
# (e.g., "Velvet pouch", "Branded gift box with ribbon", "Kraft paper bag").
# Used on PDPs as a visual ops signal and as an upsell hook for gift wrapping.

mutation CreatePackagingDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

