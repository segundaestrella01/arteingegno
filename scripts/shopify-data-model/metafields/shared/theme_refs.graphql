# Shared metafield: themes (list of Theme metaobject references)
#
# Links a product to one or more Theme metaobjects. Powers theme
# landing pages and theme filters on collection listings.
#
# PREREQUISITE: the `theme` metaobject definition must exist first —
# run `../../metaobjects/theme.graphql` before this file.

mutation CreateThemesRefDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}

# Variables payload:
#
# {
#   "definition": {
#     "name": "Themes",
#     "namespace": "custom_shared",
#     "key": "themes",
#     "description": "One or more Theme metaobject references that categorize this product.",
#     "type": "list.metaobject_reference",
#     "ownerType": "PRODUCT",
#     "validations": [
#       {
#         "name": "metaobject_definition_id",
#         "value": "<theme metaobject definition ID from metaobjects/theme.graphql run>"
#       }
#     ]
#   }
# }
