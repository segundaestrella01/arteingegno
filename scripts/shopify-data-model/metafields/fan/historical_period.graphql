# Fan metafield: historical_period
#
# The historical period or artistic movement that inspired this fan's design.
# Adds cultural context for collector-minded buyers and powers editorial
# storytelling. Controlled vocabulary: Rococo, Victorian, Belle Époque,
# Art Nouveau, Art Deco, Contemporary.

mutation CreateFanHistoricalPeriodDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

