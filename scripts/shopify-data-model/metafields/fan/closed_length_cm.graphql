# Fan metafield: closed_length_cm
#
# Length of the fan from the pivot/rivet to the tip when fully closed,
# in centimeters. Useful for buyers assessing portability and for
# packaging size calculations.

mutation CreateFanClosedLengthCmDefinition($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      type {
        name
      }
      ownerType
    }
    userErrors {
      field
      message
      code
    }
  }
}

