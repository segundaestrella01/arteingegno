# Metaobject: Theme
#
# Customer-facing thematic groupings (nautical, zodiac, celestial,
# botanical, etc.). Used to power theme landing pages and as a
# filter facet on collection listings.
#
# A single product can reference multiple themes (metafield of type
# list.metaobject_reference).
#
# Run: once against the production store (mattiastore-3117.myshopify.com).

mutation CreateThemeDefinition($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      name
      type
      fieldDefinitions {
        key
        name
        type {
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}

