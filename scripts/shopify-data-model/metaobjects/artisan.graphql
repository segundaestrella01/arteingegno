# Metaobject: Artisan
#
# Optional public-facing maker attribution. Lets a product page show
# "Made by <artisan>" with a real bio, photo, and workshop location
# rather than just a string.
#
# Not every product needs one — the metafield that points to this
# metaobject is optional on products. Some pieces will remain
# attributed only to "Arte&Ingegno".
#
# OPEN QUESTION (see Notion proposal note, "Artisan public
# attribution"): the user has not yet confirmed whether artisans
# should be shown publicly. Create the definition on the dev store
# only until that decision is made.
#
# Run: once per store (dev first, then prod after confirmation).

mutation CreateArtisanDefinition($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      name
      type
      fieldDefinitions {
        key
        name
        type {
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}

