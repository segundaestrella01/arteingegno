# Metaobject: Editorial collection
#
# Curatorial groupings (e.g. "Summer 2026 capsule", "Gift ideas under
# €50") that span multiple Shopify Collections and product types.
# Distinct from Shopify's built-in Collections — those are for
# navigational grouping; these are for storytelling pages.
#
# Referenced by per-product metafields of type
# metaobject_reference.
#
# Run: once per store (dev first, then prod after verification).

mutation CreateEditorialCollectionDefinition($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      name
      type
      fieldDefinitions {
        key
        name
        type {
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}

